{% extends "auth/base.html" %}
{% block title %}User Management{% endblock %}

{% block content %}
<div class="min-h-screen bg-[#f8f9fd] p-6">
  <div class="max-w-5xl mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">User Management</h1>
        <p class="text-sm text-gray-500 mt-0.5">Manage users in your tenant</p>
      </div>
      <div class="flex items-center gap-3">
        <input id="search-box" type="search" placeholder="Filter by email…"
               class="input-base w-56" oninput="filterRows(this.value)" />
      </div>
    </div>

    <!-- Stats row -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-2xl border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] p-5">
        <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Total users</p>
        <p id="stat-total" class="text-3xl font-bold text-gray-900">—</p>
      </div>
      <div class="bg-white rounded-2xl border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] p-5">
        <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">MFA enabled</p>
        <p id="stat-mfa" class="text-3xl font-bold text-brand">—</p>
      </div>
      <div class="bg-white rounded-2xl border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] p-5">
        <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-1">Locked now</p>
        <p id="stat-locked" class="text-3xl font-bold text-red-500">—</p>
      </div>
    </div>

    <!-- Table card -->
    <div class="bg-white rounded-3xl border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)] overflow-hidden">
      <div id="loading-row" class="flex items-center justify-center py-20 text-gray-400">
        <div class="spinner" style="border-color:#e5e7eb;border-top-color:#5D5FEF;width:28px;height:28px;"></div>
        <span class="ml-3 text-sm">Loading users…</span>
      </div>
      <table id="users-table" class="hidden w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-100">
          <tr>
            <th class="text-left py-3 px-5 text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
            <th class="text-left py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
            <th class="text-left py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">MFA</th>
            <th class="text-left py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Role</th>
            <th class="py-3 px-5"></th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
      <div id="empty-row" class="hidden text-center py-16 text-gray-400 text-sm">No users found.</div>

      <!-- Pagination -->
      <div id="pagination" class="hidden flex items-center justify-between px-5 py-4 border-t border-gray-100">
        <p id="page-info" class="text-xs text-gray-400"></p>
        <div class="flex gap-2">
          <button onclick="changePage(-1)" id="btn-prev"
                  class="px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-medium text-gray-600 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
            ← Prev
          </button>
          <button onclick="changePage(1)" id="btn-next"
                  class="px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-medium text-gray-600 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
            Next →
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Toast (inherited from base) -->
<script>
const TOKEN = localStorage.getItem('auth_token') || localStorage.getItem('auth_access_token') || '';
let currentPage = 1;
let totalUsers = 0;
const PAGE_LIMIT = 20;
let allRows = [];

async function loadUsers(page = 1) {
  currentPage = page;
  try {
    const res = await fetch(`/admin/users?page=${page}&limit=${PAGE_LIMIT}`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` },
    });
    if (res.status === 401 || res.status === 403) {
      document.getElementById('loading-row').innerHTML =
        '<p class="text-sm text-red-500 py-16 w-full text-center">Access denied — superuser account required.</p>';
      return;
    }
    const data = await res.json();
    totalUsers = data.total;
    allRows = data.users;
    renderTable(allRows);
    renderStats(allRows, data.total);
    renderPagination(page, data.total);
  } catch (e) {
    document.getElementById('loading-row').innerHTML =
      `<p class="text-sm text-red-500 py-16 w-full text-center">${e.message}</p>`;
  }
}

function renderStats(users, total) {
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-mfa').textContent = users.filter(u => u.is_totp_enabled).length + (total > PAGE_LIMIT ? '+' : '');
  document.getElementById('stat-locked').textContent = users.filter(u => u.locked_until).length;
}

function renderTable(users) {
  document.getElementById('loading-row').classList.add('hidden');
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '';

  if (!users.length) {
    document.getElementById('users-table').classList.add('hidden');
    document.getElementById('empty-row').classList.remove('hidden');
    return;
  }

  document.getElementById('users-table').classList.remove('hidden');
  document.getElementById('empty-row').classList.add('hidden');

  users.forEach(u => {
    const isLocked = !!u.locked_until && new Date(u.locked_until) > new Date();
    const statusBadge = !u.is_active
      ? `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500">Disabled</span>`
      : isLocked
      ? `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-50 text-red-600">Locked</span>`
      : `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-600"><span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block"></span>Active</span>`;

    const mfaBadge = u.is_totp_enabled
      ? `<span class="text-brand font-medium">✓ TOTP</span>`
      : `<span class="text-gray-400">—</span>`;

    const roleBadge = u.is_superuser
      ? `<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-purple-50 text-purple-600">Superuser</span>`
      : `<span class="text-gray-400 text-xs">Member</span>`;

    const toggleLabel = u.is_active ? 'Disable' : 'Enable';
    const toggleClass = u.is_active
      ? 'text-red-500 hover:text-red-700'
      : 'text-green-600 hover:text-green-800';

    const tr = document.createElement('tr');
    tr.className = 'border-b border-gray-50 hover:bg-gray-50/50 transition-colors';
    tr.dataset.email = u.email.toLowerCase();
    tr.id = `row-${u.id}`;
    tr.innerHTML = `
      <td class="py-3.5 px-5">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-brand-subtle flex items-center justify-center text-brand font-semibold text-sm select-none flex-shrink-0">
            ${u.email[0].toUpperCase()}
          </div>
          <div>
            <p class="font-medium text-gray-800">${escHtml(u.email)}</p>
            ${u.failed_login_count > 0 ? `<p class="text-xs text-amber-500">${u.failed_login_count} failed attempt${u.failed_login_count > 1 ? 's' : ''}</p>` : ''}
          </div>
        </div>
      </td>
      <td class="py-3.5 px-4">${statusBadge}</td>
      <td class="py-3.5 px-4">${mfaBadge}</td>
      <td class="py-3.5 px-4">${roleBadge}</td>
      <td class="py-3.5 px-5 text-right">
        <button onclick="toggleUser('${u.id}', ${!u.is_active})"
                class="text-xs font-medium ${toggleClass} hover:underline focus:outline-none" id="toggle-${u.id}">
          ${toggleLabel}
        </button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function renderPagination(page, total) {
  const pages = Math.ceil(total / PAGE_LIMIT);
  if (pages <= 1) { document.getElementById('pagination').classList.add('hidden'); return; }
  document.getElementById('pagination').classList.remove('hidden');
  document.getElementById('page-info').textContent = `Page ${page} of ${pages} · ${total} users`;
  document.getElementById('btn-prev').disabled = page <= 1;
  document.getElementById('btn-next').disabled = page >= pages;
}

function changePage(delta) { loadUsers(currentPage + delta); }

function filterRows(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('#users-tbody tr').forEach(tr => {
    tr.style.display = tr.dataset.email.includes(q) ? '' : 'none';
  });
}

async function toggleUser(userId, newActive) {
  const btn = document.getElementById(`toggle-${userId}`);
  btn.textContent = 'Saving…';
  btn.disabled = true;
  try {
    const res = await fetch(`/admin/users/${userId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_active: newActive }),
    });
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || 'Failed');
    await loadUsers(currentPage);
    showToast('success', newActive ? 'User enabled.' : 'User disabled.');
  } catch (e) {
    showToast('error', e.message);
    btn.textContent = newActive ? 'Enable' : 'Disable';
    btn.disabled = false;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadUsers(1);
</script>
{% endblock %}
