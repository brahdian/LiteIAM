<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Auth{% endblock %} — Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Tailwind CDN MUST load before the config block so `tailwind` is defined -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: { brand: { DEFAULT: '#5D5FEF', hover: '#4d4fdf', ring: '#5D5FEF33' } },
          borderRadius: { '2xl': '1rem', '3xl': '1.5rem', '4xl': '2rem' },
          boxShadow: {
            card: '0 20px 50px rgba(0,0,0,0.05)',
            btn: '0 4px 14px rgba(93,95,239,0.30)',
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .input-base {
      display: block; width: 100%; height: 42px; border-radius: 0.75rem;
      border: 1px solid #e5e7eb; padding: 0 1rem;
      font-size: 0.875rem; color: #111827; background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .input-base:focus { border-color: #5D5FEF; box-shadow: 0 0 0 4px rgba(93,95,239,.1); }
    .input-base:disabled { background: #f9fafb; cursor: not-allowed; }
    .input-error { border-color: #ef4444 !important; }
    .input-error:focus { box-shadow: 0 0 0 4px rgba(239,68,68,.1) !important; }
    .btn-primary {
      display: flex; align-items: center; justify-content: center; width: 100%;
      border-radius: 0.75rem; background: #5D5FEF; color: #fff;
      font-size: 0.875rem; font-weight: 700; padding: 0.75rem 1.5rem;
      box-shadow: 0 4px 14px rgba(93,95,239,.30);
      border: none; cursor: pointer; transition: background .15s, box-shadow .15s;
    }
    .btn-primary:hover:not(:disabled) { background: #4d4fdf; }
    .btn-primary:disabled { background: #e5e7eb; color: #9ca3af; box-shadow: none; cursor: not-allowed; }
    .btn-secondary {
      display: flex; align-items: center; justify-content: center; width: 100%;
      border-radius: 0.75rem; background: #fff; color: #374151;
      font-size: 0.875rem; font-weight: 600; padding: 0.75rem 1.5rem;
      border: 1px solid #d1d5db; cursor: pointer; transition: background .15s;
    }
    .btn-secondary:hover:not(:disabled) { background: #f9fafb; }
    .spinner {
      display: inline-block; width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Toast */
    #toast {
      position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999;
      display: flex; flex-direction: column; gap: .5rem;
    }
    .toast-item {
      padding: .75rem 1.25rem; border-radius: .75rem; font-size: .875rem;
      font-weight: 500; min-width: 220px; max-width: 360px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12); animation: fadeIn .2s ease;
    }
    .toast-error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    .toast-success { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    /* Brand classes — defined in CSS so they work in both static and dynamically-injected HTML */
    .text-brand { color: #5D5FEF; }
    .bg-brand { background-color: #5D5FEF; }
    .bg-brand-subtle { background-color: rgba(93,95,239,.10); }
    .border-brand { border-color: #5D5FEF; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-[#f8f9fd] antialiased">

<div id="toast" aria-live="polite"></div>

<main class="flex min-h-screen flex-col items-center justify-center px-4 py-10">
  <!-- Auth Logo -->
  <a href="/" class="mb-8 flex items-center gap-2.5 focus:outline-none">
    <svg width="36" height="36" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#5D5FEF"/>
          <stop offset="100%" stop-color="#7c7ffa"/>
        </linearGradient>
      </defs>
      <rect width="40" height="40" rx="11" fill="url(#logo-grad)"/>
      <path fill-rule="evenodd" fill="white" d="M20,8.5 L7.5,32 H12.5 L16.2,23.5 H23.8 L27.5,32 H32.5 L20,8.5 Z M20,12.5 L17.0,23.5 H23.0 Z"/>
    </svg>
    <span style="font-family:Inter,sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:-.4px;color:#0f1324"><span style="color:#5D5FEF">Auth</span></span>
  </a>

  <!-- Card — width and padding can be overridden per page via card_class block -->
  <div class="{% block card_class %}w-full max-w-[440px] rounded-[2rem] border border-gray-100 bg-white p-8 shadow-[0_20px_50px_rgba(0,0,0,0.05)] sm:p-10{% endblock %}">
    {% block content %}{% endblock %}
  </div>

  <p class="mt-6 text-xs text-gray-400">
    &copy; {{ year }} Auth &mdash;
    <a href="/privacy" class="hover:underline">Privacy</a> &middot;
    <a href="/terms" class="hover:underline">Terms</a>
  </p>
</main>

<script>
  // Toast utility
  function showToast(message, type = 'error') {
    const container = document.getElementById('toast');
    const el = document.createElement('div');
    el.className = `toast-item toast-${type}`;
    el.textContent = message;
    container.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 350); }, 4000);
  }

  // Helper: call the auth API
  async function authFetch(url, body, method = 'POST') {
    const r = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw { status: r.status, detail: data.detail || 'Something went wrong.' };
    return data;
  }

  // Parse query params
  function qp(name) { return new URLSearchParams(window.location.search).get(name); }

  // Store token
  function storeToken(token, tokenType = 'bearer') {
    localStorage.setItem('auth_access_token', token);
    localStorage.setItem('auth_token_type', tokenType);
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
